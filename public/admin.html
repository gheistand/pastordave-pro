<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Church Pro Admin — Pastor Dave Pro</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8f5f0;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      padding: 0.75rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #fff;
      border-bottom: 1px solid #e5e0d8;
    }

    .logo { font-size: 1.1rem; font-weight: 700; color: #7c4f2a; }
    .church-label {
      font-size: 0.8rem;
      color: #888;
      margin-left: 0.5rem;
      font-weight: 400;
    }

    /* ── Tab bar ── */
    .tab-bar {
      background: #fff;
      border-bottom: 1px solid #e5e0d8;
      display: flex;
      gap: 0;
      padding: 0 2rem;
      overflow-x: auto;
    }

    .tab-btn {
      padding: 0.75rem 1.25rem;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      font-size: 0.9rem;
      font-weight: 500;
      color: #666;
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab-btn:hover { color: #7c4f2a; }
    .tab-btn.active { color: #7c4f2a; border-bottom-color: #7c4f2a; }

    /* ── Main content ── */
    main { flex: 1; padding: 2rem; max-width: 1100px; width: 100%; margin: 0 auto; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    h2 {
      font-size: 1.3rem;
      font-weight: 700;
      color: #7c4f2a;
      margin-bottom: 1.25rem;
    }

    /* ── Tables ── */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    thead tr { background: #7c4f2a; color: #fff; }
    th {
      padding: 0.65rem 0.85rem;
      text-align: left;
      font-weight: 600;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    tbody tr { border-bottom: 1px solid #f0ebe3; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #faf7f3; }
    tbody tr.resolved-row { opacity: 0.55; }

    td {
      padding: 0.65rem 0.85rem;
      vertical-align: top;
    }

    .notes-cell {
      max-width: 260px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .date-cell { white-space: nowrap; color: #666; font-size: 0.82rem; }

    /* ── Badges ── */
    .badge {
      display: inline-block;
      padding: 0.15rem 0.55rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: capitalize;
      background: #e9ecef;
      color: #495057;
    }

    .badge-crisis, .badge-urgent { background: #f8d7da; color: #721c24; }
    .badge-concerning { background: #fff3cd; color: #856404; }
    .badge-moderate { background: #cfe2ff; color: #084298; }
    .badge-low { background: #d1e7dd; color: #0a3622; }

    /* ── Buttons ── */
    .resolve-btn {
      padding: 0.3rem 0.7rem;
      background: #7c4f2a;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 0.8rem;
      cursor: pointer;
      white-space: nowrap;
    }

    .resolve-btn:hover { background: #6a4224; }
    .resolved-label { font-size: 0.8rem; color: #198754; font-weight: 500; }

    /* ── Sermon form ── */
    .form-toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    #toggle-sermon-form {
      padding: 0.4rem 1rem;
      background: #7c4f2a;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.875rem;
      cursor: pointer;
    }

    #toggle-sermon-form:hover { background: #6a4224; }

    #sermon-form-wrapper {
      display: none;
      background: #fff;
      border: 1px solid #e5e0d8;
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    #sermon-form-wrapper h3 {
      font-size: 1rem;
      font-weight: 600;
      color: #7c4f2a;
      margin-bottom: 1rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    .form-full { grid-column: 1 / -1; }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 0.25rem;
    }

    input[type=text], input[type=date], textarea {
      width: 100%;
      padding: 0.5rem 0.7rem;
      border: 1px solid #d0cbc3;
      border-radius: 5px;
      font-size: 0.875rem;
      font-family: inherit;
      background: #fafafa;
      color: #1a1a1a;
    }

    input[type=text]:focus, input[type=date]:focus, textarea:focus {
      outline: none;
      border-color: #7c4f2a;
      background: #fff;
    }

    textarea { resize: vertical; min-height: 80px; }

    .form-actions { margin-top: 1rem; display: flex; align-items: center; gap: 1rem; }

    .submit-btn {
      padding: 0.5rem 1.25rem;
      background: #7c4f2a;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
    }

    .submit-btn:hover { background: #6a4224; }
    .submit-btn:disabled { opacity: 0.6; cursor: default; }

    .cancel-btn {
      padding: 0.5rem 1.25rem;
      background: #999;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
    }

    .cancel-btn:hover { background: #777; }

    .edit-btn {
      padding: 0.3rem 0.7rem;
      background: #7c4f2a;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 0.8rem;
      cursor: pointer;
      white-space: nowrap;
      margin-right: 0.5rem;
    }

    .edit-btn:hover { background: #6a4224; }

    .sermon-edit-row {
      display: none;
      background: #faf7f3;
    }

    .sermon-edit-row.open {
      display: table-row;
    }

    .edit-form-cell {
      padding: 1rem;
      grid-column: 1 / -1;
    }

    .form-status { font-size: 0.875rem; }
    .form-status.success { color: #198754; }
    .form-status.error { color: #dc3545; }

    /* ── Stats grid ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1rem;
    }

    .stat-card {
      background: #fff;
      border: 1px solid #e5e0d8;
      border-radius: 8px;
      padding: 1.25rem 1rem;
      text-align: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }

    .stat-number {
      font-size: 2rem;
      font-weight: 700;
      color: #7c4f2a;
      line-height: 1;
      margin-bottom: 0.4rem;
    }

    .stat-label {
      font-size: 0.8rem;
      color: #666;
      font-weight: 500;
    }

    /* ── States ── */
    .loading { color: #888; font-size: 0.9rem; padding: 1.5rem 0; }
    .empty-state { color: #888; font-size: 0.9rem; padding: 1.5rem 0; }
    .error-box {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c2c7;
      border-radius: 6px;
      padding: 0.75rem 1rem;
      font-size: 0.875rem;
    }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      header { padding: 0.75rem 1rem; }
      main { padding: 1rem; }
      .tab-bar { padding: 0 0.5rem; }
      .tab-btn { padding: 0.65rem 0.85rem; font-size: 0.82rem; }
      .form-grid { grid-template-columns: 1fr; }
      .notes-cell { max-width: 130px; }
    }
  </style>
</head>
<body>

  <header>
    <div>
      <span class="logo">Pastor Dave Pro</span>
      <span class="church-label">New Horizon Church — Admin</span>
    </div>
    <div id="user-button"></div>
  </header>

  <nav class="tab-bar">
    <button class="tab-btn active" data-tab="visitors">Visitors</button>
    <button class="tab-btn" data-tab="alerts">Pastoral Alerts</button>
    <button class="tab-btn" data-tab="sermons">Sermons</button>
    <button class="tab-btn" data-tab="stats">Stats</button>
  </nav>

  <main>

    <!-- Visitors -->
    <div class="tab-panel active" id="panel-visitors">
      <h2>Visitors</h2>
      <div id="visitors-table"><div class="loading">Loading…</div></div>
    </div>

    <!-- Pastoral Alerts -->
    <div class="tab-panel" id="panel-alerts">
      <h2>Pastoral Alerts</h2>
      <div id="alerts-table"><div class="loading">Loading…</div></div>
    </div>

    <!-- Sermons -->
    <div class="tab-panel" id="panel-sermons">
      <div class="form-toggle-row">
        <h2 style="margin-bottom:0">Sermons</h2>
        <button id="toggle-sermon-form">+ Add Sermon</button>
      </div>

      <div id="sermon-form-wrapper">
        <h3>Upload New Sermon</h3>
        <form id="sermon-form" autocomplete="off">
          <div class="form-grid">
            <div>
              <label for="f-title">Title *</label>
              <input type="text" id="f-title" name="title" required placeholder="e.g. Walking in Faith" />
            </div>
            <div>
              <label for="f-pastor">Pastor *</label>
              <input type="text" id="f-pastor" name="pastor" required placeholder="e.g. Pastor Mark Jordan" />
            </div>
            <div>
              <label for="f-date">Date *</label>
              <input type="date" id="f-date" name="date" required />
            </div>
            <div>
              <label for="f-series">Series</label>
              <input type="text" id="f-series" name="series" placeholder="e.g. Faith & Works" />
            </div>
            <div class="form-full">
              <label for="f-scripture">Scripture Reference</label>
              <input type="text" id="f-scripture" name="scripture" placeholder="e.g. James 2:14-26" />
            </div>
            <div class="form-full">
              <label for="f-summary">Summary</label>
              <textarea id="f-summary" name="summary" placeholder="Brief summary of the sermon…"></textarea>
            </div>
            <div class="form-full">
              <label for="f-key_points">Key Points</label>
              <textarea id="f-key_points" name="key_points" placeholder="Main takeaways, one per line or as prose…"></textarea>
            </div>
            <div class="form-full">
              <label for="f-discussion_questions">Discussion Questions</label>
              <textarea id="f-discussion_questions" name="discussion_questions" placeholder="Small group discussion questions…"></textarea>
            </div>
            <div>
              <label for="f-youtube_id">YouTube Video ID</label>
              <input type="text" id="f-youtube_id" name="youtube_id" placeholder="e.g. 8K_BInk1qsQ" />
            </div>
          </div>
          <div class="form-actions">
            <button type="submit" class="submit-btn">Upload Sermon</button>
            <span id="sermon-form-status" class="form-status"></span>
          </div>
        </form>
      </div>

      <div id="sermons-table"><div class="loading">Loading…</div></div>
    </div>

    <!-- Stats -->
    <div class="tab-panel" id="panel-stats">
      <h2>Stats</h2>
      <div id="stats-content"><div class="loading">Loading…</div></div>
    </div>

  </main>

  <!-- Clerk browser SDK -->
  <script>window.CLERK_PUBLISHABLE_KEY = 'pk_live_Y2xlcmsucGFzdG9yZGF2ZXByby5vcmck';</script>
  <script
    async
    crossorigin="anonymous"
    data-clerk-publishable-key="pk_live_Y2xlcmsucGFzdG9yZGF2ZXByby5vcmck"
    src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@5.125.7/dist/clerk.browser.js"
    type="text/javascript"
  ></script>

  <script src="/src/auth.js"></script>
  <script src="/src/admin.js"></script>
</body>
</html>
